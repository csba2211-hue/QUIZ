<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Jugadores</title>

<style>

body{
    font-family:Arial;
    background:linear-gradient(135deg,#11998e,#38ef7d);
    padding:40px;
}

.contenedor{
    background:white;
    width:700px;
    margin:auto;
    padding:30px;
    border-radius:20px;
    box-shadow:0px 0px 20px rgba(0,0,0,0.4);
}

h1{
    text-align:center;
    color:#11998e;
}

ul{
    list-style:none;
    padding:0;
}

li{
    background:#f4f4f4;
    margin:15px 0;
    padding:20px;
    border-radius:10px;
    font-size:18px;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 22px;
    border-radius:10px;
    text-decoration:none;
    color:white;
    background:#343a40;
    transition:0.3s;
}

.btn:hover{
    background:black;
    transform:scale(1.05);
}

.editar{

    background:#f59e0b;

    color:white;

    padding:10px 14px;

    border-radius:8px;

    text-decoration:none;

    margin-right:10px;
}

.eliminar{

    background:#dc2626;

    color:white;

    padding:10px 14px;

    border-radius:8px;

    text-decoration:none;
}

.editar:hover,
.eliminar:hover{

    opacity:0.9;
}

</style>

</head>

<body>

<div class="contenedor">

<h1>⚽ Jugadores Registrados</h1>

<ul>

<li th:each="j : ${jugadores}">

👤
<b th:text="${j.nombre}"></b>

<br><br>

📌
<span th:text="${j.posicion}"></span>

<br><br>

<a class="editar"
   th:href="@{/jugadores/editar/{id}(id=${j.id})}">
   ✏ Editar
</a>

<a class="eliminar"
   th:href="@{/jugadores/eliminar/{id}(id=${j.id})}">
   🗑 Eliminar
</a>

</li>

</ul>

<a href="/" class="btn">
    ⬅ Volver al Inicio
</a>

</div>

</body>
</html>
