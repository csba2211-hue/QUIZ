<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Crear Club</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(135deg,#1d2671,#c33764);
    margin:0;
    padding:40px;
}

.container{
    width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:#1d2671;
}

label{
    font-weight:bold;
    display:block;
    margin-top:15px;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    margin-top:25px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#1d2671;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#c33764;
}

</style>

</head>
<body>

<div class="container">

<h1>Crear Club</h1>

<form th:action="@{/clubes/guardar}" th:object="${club}" method="post">

<label>Nombre del Club</label>
<input type="text" th:field="*{nombre}" required>

<label>Entrenador</label>
<select th:field="*{entrenador}">
    <option th:each="e : ${entrenadores}"
            th:value="${e.id}"
            th:text="${e.nombre}">
    </option>
</select>

<label>Asociación</label>
<select th:field="*{asociacion}">
    <option th:each="a : ${asociaciones}"
            th:value="${a.id}"
            th:text="${a.nombre}">
    </option>
</select>

<label>Jugadores</label>
<select th:field="*{jugadores}" multiple size="5">

    <option th:each="j : ${jugadores}"
            th:value="${j.id}"
            th:text="${j.nombre + ' - ' + j.posicion}">
    </option>

</select>

<label>Competiciones</label>
<select th:field="*{competiciones}" multiple size="4">

    <option th:each="c : ${competiciones}"
            th:value="${c.id}"
            th:text="${c.nombre}">
    </option>

</select>

<button type="submit">
Guardar Club
</button>

</form>

</div>

</body>
</html>
